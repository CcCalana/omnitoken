name: ci

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23.x"
      - name: Verify formatting
        run: test -z "$(gofmt -l .)"
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test -race ./...

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build gateway image
        run: docker build -f deploy/Dockerfile.gateway -t omnitoken-gateway:ci .
      - name: Build admin image
        run: docker build -f deploy/Dockerfile.admin -t omnitoken-admin:ci .
