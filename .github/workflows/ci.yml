name: ci

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23.x"
      - name: Verify formatting
        run: test -z "$(gofmt -l .)"
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test -race ./...
      - name: License check
        run: |
          allowed="$(grep -vE '^\s*(#|$)' .licenses/allowed.txt | paste -sd, -)"
          go run github.com/google/go-licenses@v1.6.0 check ./... --ignore github.com/omnitoken/omnitoken --allowed_licenses="${allowed}"
          go run github.com/google/go-licenses@v1.6.0 report ./... --ignore github.com/omnitoken/omnitoken

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build gateway image
        run: docker build -f deploy/Dockerfile.gateway -t omnitoken-gateway:ci .
      - name: Build admin image
        run: docker build -f deploy/Dockerfile.admin -t omnitoken-admin:ci .
      - name: Build migrate image
        run: docker build -f deploy/Dockerfile.migrate -t omnitoken-migrate:ci .
