name: omnitoken

services:
  postgres:
    image: postgres:16-alpine
    command: ["postgres", "-c", "shared_preload_libraries=pg_stat_statements"]
    environment:
      POSTGRES_USER: omnitoken
      POSTGRES_PASSWORD: omnitoken
      POSTGRES_DB: omnitoken
    ports:
      - "${OMNITOKEN_POSTGRES_PORT:-15432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U omnitoken -d omnitoken"]
      interval: 5s
      timeout: 3s
      retries: 20

  migrate:
    image: omnitoken-migrate:local
    build:
      context: ..
      dockerfile: deploy/Dockerfile.migrate
    environment:
      OMNITOKEN_DATABASE_URL: "postgres://omnitoken:omnitoken@postgres:5432/omnitoken?sslmode=disable"
    command: ["up"]
    depends_on:
      postgres:
        condition: service_healthy

  seed:
    image: postgres:16-alpine
    environment:
      PGPASSWORD: omnitoken
    volumes:
      - ./postgres/002_seed.sql:/seed/002_seed.sql:ro
    command:
      [
        "psql",
        "-h",
        "postgres",
        "-U",
        "omnitoken",
        "-d",
        "omnitoken",
        "-v",
        "ON_ERROR_STOP=1",
        "-f",
        "/seed/002_seed.sql"
      ]
    depends_on:
      migrate:
        condition: service_completed_successfully

  credential-seed:
    image: omnitoken-migrate:local
    # Credential changes are loaded by the gateway at startup. Re-run this
    # service, then restart gateway for new upstream keys to take effect.
    entrypoint: ["/omnitoken-seed-upstream"]
    environment:
      OMNITOKEN_DATABASE_URL: "postgres://omnitoken:omnitoken@postgres:5432/omnitoken?sslmode=disable"
      OMNITOKEN_MASTER_KEY_FILE: "${OMNITOKEN_MASTER_KEY_FILE:-}"
      OMNITOKEN_MASTER_KEY: "${OMNITOKEN_MASTER_KEY:-}"
      OMNITOKEN_ARK_KEYS: "${OMNITOKEN_ARK_KEYS:-}"
      OMNITOKEN_ARK_KEYS_1: "${OMNITOKEN_ARK_KEYS_1:-}"
      OMNITOKEN_ARK_KEYS_2: "${OMNITOKEN_ARK_KEYS_2:-}"
      OMNITOKEN_ARK_KEYS_3: "${OMNITOKEN_ARK_KEYS_3:-}"
      OMNITOKEN_ARK_OPENAI_BASE_URL: "${OMNITOKEN_ARK_OPENAI_BASE_URL:-https://ark.cn-beijing.volces.com/api/coding/v3}"
      OMNITOKEN_DEEPSEEK_KEYS: "${OMNITOKEN_DEEPSEEK_KEYS:-}"
      OMNITOKEN_DEEPSEEK_KEYS_1: "${OMNITOKEN_DEEPSEEK_KEYS_1:-}"
      OMNITOKEN_DEEPSEEK_KEYS_2: "${OMNITOKEN_DEEPSEEK_KEYS_2:-}"
      OMNITOKEN_DEEPSEEK_KEYS_3: "${OMNITOKEN_DEEPSEEK_KEYS_3:-}"
      OMNITOKEN_DEEPSEEK_BASE_URL: "${OMNITOKEN_DEEPSEEK_BASE_URL:-https://api.deepseek.com/v1}"
    depends_on:
      seed:
        condition: service_completed_successfully

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${OMNITOKEN_REDIS_PORT:-16379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  nats:
    image: nats:2.10-alpine
    command: ["-js", "-m", "8222"]
    ports:
      - "${OMNITOKEN_NATS_PORT:-14222}:4222"
      - "${OMNITOKEN_NATS_MONITOR_PORT:-18222}:8222"
    volumes:
      - nats_data:/data
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:8222/healthz"]
      interval: 5s
      timeout: 3s
      retries: 20

  mock-ark:
    image: omnitoken-mockark:local
    build:
      context: ..
      dockerfile: deploy/Dockerfile.mockark
    ports:
      - "${OMNITOKEN_MOCK_ARK_PORT:-18090}:8090"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8090/healthz"]
      interval: 5s
      timeout: 3s
      retries: 20

  gateway:
    image: omnitoken-gateway:local
    build:
      context: ..
      dockerfile: deploy/Dockerfile.gateway
    environment:
      OMNITOKEN_GATEWAY_ADDR: ":8080"
      OMNITOKEN_DATABASE_URL: "postgres://omnitoken:omnitoken@postgres:5432/omnitoken?sslmode=disable"
      # Gateway and admin must share the same master key so admin-created
      # credentials can be decrypted by the gateway polling reloader.
      OMNITOKEN_MASTER_KEY_FILE: "${OMNITOKEN_MASTER_KEY_FILE:-}"
      OMNITOKEN_MASTER_KEY: "${OMNITOKEN_MASTER_KEY:-}"
      OMNITOKEN_CREDENTIAL_POLL_INTERVAL: "${OMNITOKEN_CREDENTIAL_POLL_INTERVAL:-30s}"
      OMNITOKEN_ARK_API_KEY: "${OMNITOKEN_ARK_API_KEY:-}"
      OMNITOKEN_ARK_OPENAI_BASE_URL: "${OMNITOKEN_ARK_OPENAI_BASE_URL:-https://ark.cn-beijing.volces.com/api/coding/v3}"
      OMNITOKEN_ARK_ANTHROPIC_BASE_URL: "${OMNITOKEN_ARK_ANTHROPIC_BASE_URL:-https://ark.cn-beijing.volces.com/api/coding}"
      OMNITOKEN_ARK_DEFAULT_MODEL: "${OMNITOKEN_ARK_DEFAULT_MODEL:-ark-code-latest}"
      OMNITOKEN_ARK_DISABLE_THINKING: "${OMNITOKEN_ARK_DISABLE_THINKING:-true}"
    ports:
      - "8080:8080"
    depends_on:
      seed:
        condition: service_completed_successfully
      credential-seed:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy

  admin:
    image: omnitoken-admin:local
    build:
      context: ..
      dockerfile: deploy/Dockerfile.admin
    environment:
      OMNITOKEN_ADMIN_ADDR: ":8081"
      OMNITOKEN_DATABASE_URL: "postgres://omnitoken:omnitoken@postgres:5432/omnitoken?sslmode=disable"
      OMNITOKEN_ADMIN_BOOTSTRAP_TOKEN: "${OMNITOKEN_ADMIN_BOOTSTRAP_TOKEN:-}"
      # Admin encrypts newly added upstream credentials with this same key.
      OMNITOKEN_MASTER_KEY_FILE: "${OMNITOKEN_MASTER_KEY_FILE:-}"
      OMNITOKEN_MASTER_KEY: "${OMNITOKEN_MASTER_KEY:-}"
      OMNITOKEN_ADMIN_SESSION_TTL: "${OMNITOKEN_ADMIN_SESSION_TTL:-24h}"
      OMNITOKEN_ADMIN_KEY_ANOMALY_RPM_5M: "${OMNITOKEN_ADMIN_KEY_ANOMALY_RPM_5M:-60}"
      OMNITOKEN_ADMIN_CORS_ORIGINS: "${OMNITOKEN_ADMIN_CORS_ORIGINS:-http://localhost:3000}"
      OMNITOKEN_ADMIN_CORS_METHODS: "${OMNITOKEN_ADMIN_CORS_METHODS:-GET,POST,PATCH,DELETE,OPTIONS}"
    ports:
      - "8081:8081"
    depends_on:
      seed:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy

  test:
    image: golang:1.25-alpine
    working_dir: /workspace
    volumes:
      - ..:/workspace
      - go_mod_cache:/go/pkg/mod
      - go_build_cache:/root/.cache/go-build
    environment:
      CGO_ENABLED: "0"
      GOTELEMETRY: "off"
      OMNITOKEN_TEST_DATABASE_URL: "postgres://omnitoken:omnitoken@postgres:5432/omnitoken?sslmode=disable"
      OMNITOKEN_ADMIN_BOOTSTRAP_TOKEN: "${OMNITOKEN_ADMIN_BOOTSTRAP_TOKEN:-}"
      OMNITOKEN_MASTER_KEY_FILE: "${OMNITOKEN_MASTER_KEY_FILE:-}"
      OMNITOKEN_MASTER_KEY: "${OMNITOKEN_MASTER_KEY:-}"
      OMNITOKEN_DEEPSEEK_KEYS_1: "${OMNITOKEN_DEEPSEEK_KEYS_1:-}"
      OMNITOKEN_DEEPSEEK_KEYS_2: "${OMNITOKEN_DEEPSEEK_KEYS_2:-}"
      OMNITOKEN_DEEPSEEK_KEYS_3: "${OMNITOKEN_DEEPSEEK_KEYS_3:-}"
      OMNITOKEN_DEEPSEEK_BASE_URL: "${OMNITOKEN_DEEPSEEK_BASE_URL:-https://api.deepseek.com/v1}"
    depends_on:
      postgres:
        condition: service_healthy
      seed:
        condition: service_completed_successfully

volumes:
  postgres_data:
  redis_data:
  nats_data:
  go_mod_cache:
  go_build_cache:
